<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flipbook PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    overflow:hidden;
}

#flipbook{
    width:100vw;
    height:100vh;
}

.page{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.page canvas{
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>
</head>
<body>

<div id="flipbook"></div>

<script>

const pdfUrl = "anything_but_magazine.pdf";

(async()=>{

    const pdf = await pdfjsLib.getDocument(pdfUrl).promise;

    const container = document.getElementById("flipbook");

    // 1. Render PDF pages as DOM elements
    for(let i=1;i<=pdf.numPages;i++){

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1.5 });

        const wrapper = document.createElement("div");
        wrapper.className = "page";

        const canvas = document.createElement("canvas");
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
            canvasContext: canvas.getContext("2d"),
            viewport
        }).promise;

        wrapper.appendChild(canvas);
        container.appendChild(wrapper);
    }

    // 2. Init flipbook AFTER pages exist
    const flipbook = new PageFlip(container, {
        width: 500,
        height: 700,
        size: "stretch",
        autoSize: true,
        showCover: true,
        usePortrait: true,
        mobileScrollSupport: false,
        maxShadowOpacity: 0.25
    });

    flipbook.loadFromHTML(document.querySelectorAll(".page"));

})();

</script>

</body>
</html>
