<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ANYTHING BUT — Flipbook</title>
<style>
html,body{margin:0;height:100%;background:#000;font-family:Arial,sans-serif;overflow:hidden}
#app{width:100vw;height:100vh;display:flex;justify-content:center;align-items:center}
#flipbook{width:1400px;height:900px;}
.page{background:white;display:flex;justify-content:center;align-items:center;overflow:hidden}
.page canvas{width:100%;height:100%;object-fit:contain}
</style>
</head>
<body>
<div id="app"><div id="flipbook"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs" type="module"></script>
<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs';
import { PageFlip } from 'https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.module.js';

pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.mjs';

const pdf = await pdfjsLib.getDocument('magazine.pdf').promise;
const container = document.getElementById('flipbook');

for(let i=1;i<=pdf.numPages;i++){
 const page = await pdf.getPage(i);
 const viewport = page.getViewport({scale:2});
 const canvas=document.createElement('canvas');
 canvas.width=viewport.width;
 canvas.height=viewport.height;
 await page.render({canvasContext:canvas.getContext('2d'),viewport}).promise;
 const div=document.createElement('div');
 div.className='page';
 div.appendChild(canvas);
 container.appendChild(div);
}

const flipbook = new PageFlip(container,{
 width:700,
 height:900,
 size:'stretch',
 minWidth:315,
 maxWidth:1600,
 minHeight:420,
 maxHeight:2200,
 showCover:true,
 mobileScrollSupport:true
});
flipbook.loadFromHTML(document.querySelectorAll('.page'));
</script>
</body>
</html>
