<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}
</style>

</head>
<body>

<h1>Comprobando PDF...</h1>

<div id="status">Cargando...</div>

<script>

const pdfUrl = "anything_but_magazine.pdf";

pdfjsLib.getDocument(pdfUrl).promise
.then(pdf => {

    document.getElementById("status").innerHTML =
        "PDF cargado correctamente.<br>Páginas: " + pdf.numPages;

})
.catch(err => {

    document.getElementById("status").innerHTML =
        "<span style='color:red'>ERROR:</span><br>" +
        err.message;

});

</script>

</body>
</html>
