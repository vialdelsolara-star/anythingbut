<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ANYTHING BUT Magazine</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    font-family:Arial,sans-serif;
}

#viewer{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#flipbook{
    width:100%;
    height:100%;
}

.page{
    background:white;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.page canvas{
    width:100%;
    height:100%;
    object-fit:contain;
}

.loading{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:20px;
}

</style>
</head>

<body>

<div class="loading" id="loading">
Loading magazine...
</div>

<div id="viewer">
    <div id="flipbook"></div>
</div>

<div id="pages" style="display:none"></div>

<script>

const pdfUrl = "anything_but_magazine.pdf";

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let flipbook;

(async function(){

    try{

        const pdf = await pdfjsLib.getDocument(pdfUrl).promise;

        console.log("PDF loaded");
        console.log("Pages:", pdf.numPages);

        const pagesContainer = document.getElementById("pages");

        const firstPage = await pdf.getPage(1);

        const firstViewport = firstPage.getViewport({
            scale:2
        });

        const bookWidth = firstViewport.width;
        const bookHeight = firstViewport.height;

        for(let i=1;i<=pdf.numPages;i++){

            const page = await pdf.getPage(i);

            const viewport = page.getViewport({
                scale:2
            });

            const wrapper = document.createElement("div");
            wrapper.className = "page";

            const canvas = document.createElement("canvas");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: canvas.getContext("2d"),
                viewport: viewport
            }).promise;

            wrapper.appendChild(canvas);

            pagesContainer.appendChild(wrapper);
        }

        document.getElementById("loading").style.display="none";

        flipbook = new St.PageFlip(
            document.getElementById("flipbook"),
            {
                width: bookWidth,
                height: bookHeight,

                size:"stretch",

                minWidth:300,
                maxWidth:2500,

                minHeight:400,
                maxHeight:3500,

                showCover:true,

                drawShadow:true,

                maxShadowOpacity:0.5,

                flippingTime:800,

                usePortrait:true,

                mobileScrollSupport:false
            }
        );

        flipbook.loadFromHTML(
            document.querySelectorAll("#pages .page")
        );

        document.addEventListener("keydown",(e)=>{

            if(e.key==="ArrowRight"){
                flipbook.flipNext();
            }

            if(e.key==="ArrowLeft"){
                flipbook.flipPrev();
            }

        });

    }catch(err){

        console.error(err);

        document.getElementById("loading").innerHTML =
        "Error loading PDF. Check file name and path.";

    }

})();

</script>

</body>
</html>
