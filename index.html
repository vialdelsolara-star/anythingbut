<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANYTHING BUT</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#111;
    overflow:hidden;
}

#flipbook{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.page{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.page img{
    display:block;
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
}

</style>
</head>
<body>

<div id="flipbook"></div>

<script>

const pdfUrl = "anything_but_magazine.pdf";

pdfjsLib.getDocument(pdfUrl).promise.then(async (pdf) => {

    const pages = [];

    // Obtener tamaño REAL de la primera página
    const firstPage = await pdf.getPage(1);
    const firstViewport = firstPage.getViewport({
        scale: 2
    });

    // Crear flipbook usando las dimensiones reales
    const flipbook = new St.PageFlip(
        document.getElementById("flipbook"),
        {
            width: firstViewport.width,
            height: firstViewport.height,

            size: "fixed",

            showCover: true,

            maxShadowOpacity: 0.3,

            mobileScrollSupport: false,

            usePortrait: true,

            autoSize: true
        }
    );

    // Renderizar páginas PDF
    for(let i = 1; i <= pdf.numPages; i++){

        const page = await pdf.getPage(i);

        const viewport = page.getViewport({
            scale: 2
        });

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;

        const wrapper = document.createElement("div");
        wrapper.className = "page";

        const img = document.createElement("img");

        img.src = canvas.toDataURL("image/jpeg", 0.95);

        wrapper.appendChild(img);

        pages.push(wrapper);
    }

    flipbook.loadFromHTML(pages);

});

</script>

</body>
</html>
